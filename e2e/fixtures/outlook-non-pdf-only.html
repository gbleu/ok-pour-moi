<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mock Outlook Message - Non-PDF Only</title>
  </head>
  <body>
    <div role="main">
      <div role="heading" aria-level="2">Project Assets</div>

      <div role="listitem" class="message" data-is-focusable="true">
        <button role="button" aria-label="From: Bob Durand" name="From: Bob Durand">
          <span data-email="bob.durand@example.com">Bob DURAND</span>
        </button>
        <div class="message-body">
          <p>Here are the project assets.</p>
        </div>
        <div role="listbox" aria-label="Attachments">
          <div role="option" class="attachment">summary.xlsx (156 KB)</div>
          <div role="option" class="attachment">photo.jpg (2.1 MB)</div>
          <div role="option" class="attachment">notes.docx (45 KB)</div>
        </div>
      </div>
    </div>

    <button name="Reply" aria-label="Reply">Reply</button>
  </body>
</html>
