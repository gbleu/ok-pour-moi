<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mock Outlook Message - No Subject</title>
  </head>
  <body>
    <div role="main">
      <div role="listitem" class="message" data-is-focusable="true">
        <button role="button" aria-label="From: Claire Petit" name="From: Claire Petit">
          <span data-email="claire.petit@example.com">Claire PETIT</span>
        </button>
        <div class="message-body">
          <p>Message with no subject heading.</p>
        </div>
        <div role="listbox" aria-label="Attachments">
          <div role="option" class="attachment">document.pdf (500 KB)</div>
        </div>
      </div>
    </div>

    <button name="Reply" aria-label="Reply">Reply</button>
  </body>
</html>
