<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mock Outlook Message - No Attachments</title>
  </head>
  <body>
    <div role="main">
      <div role="heading" aria-level="2">Meeting Follow-up</div>

      <div role="listitem" class="message" data-is-focusable="true">
        <button role="button" aria-label="From: Alice Martin" name="From: Alice Martin">
          <span data-email="alice.martin@example.com">Alice MARTIN</span>
        </button>
        <div class="message-body">
          <p>Thanks for the meeting, no documents to share.</p>
        </div>
      </div>
    </div>

    <button name="Reply" aria-label="Reply">Reply</button>
  </body>
</html>
